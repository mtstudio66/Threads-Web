<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoThreader - 自動發文管理後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: {
                            850: '#151e2e',
                            900: '#0f172a',
                            950: '#020617',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-50 h-screen flex overflow-hidden">

    <!-- 側邊欄 -->
    <aside class="w-64 border-r border-slate-800 bg-slate-950 hidden md:flex flex-col">
        <div class="flex h-16 items-center px-6 border-b border-slate-800">
            <h1 class="text-xl font-bold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent flex items-center gap-2">
                <i class="fa-solid fa-pen-to-square text-indigo-500"></i> AutoThreader
            </h1>
        </div>
        <nav class="flex-1 space-y-1 px-3 py-4">
            <button class="flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium bg-indigo-600/10 text-indigo-400">
                <i class="fa-solid fa-pen-nib w-5 text-center"></i> 發文編輯器
            </button>
            <button class="flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-slate-400 hover:bg-slate-900 hover:text-slate-50 transition-colors">
                <i class="fa-solid fa-users w-5 text-center"></i> 帳號管理
            </button>
            <button class="flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-slate-400 hover:bg-slate-900 hover:text-slate-50 transition-colors">
                <i class="fa-solid fa-clock w-5 text-center"></i> 排程列表
            </button>
        </nav>
    </aside>

    <!-- 主內容區 -->
    <main class="flex-1 flex flex-col overflow-hidden bg-slate-900">
        <header class="flex h-16 items-center justify-between border-b border-slate-800 px-6 bg-slate-950/50 backdrop-blur">
            <h2 class="text-lg font-semibold">新增貼文</h2>
            <div class="flex items-center gap-4">
                <div class="h-8 w-8 rounded-full bg-gradient-to-r from-cyan-500 to-blue-500 flex items-center justify-center text-sm font-bold shadow-lg shadow-blue-500/20">Me</div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 md:p-8">
            <div class="max-w-3xl mx-auto space-y-6">
                
                <!-- 狀態提示框 -->
                <div id="statusAlert" class="hidden rounded-lg p-4 text-sm font-medium"></div>

                <div class="rounded-xl border border-slate-800 bg-slate-950 p-6 shadow-xl">
                    <!-- 表單 -->
                    <form id="postForm" class="space-y-5">
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-2">發布至帳號 (測試預設 ID: 1)</label>
                            <select id="accountId" class="w-full rounded-lg border border-slate-700 bg-slate-900 px-4 py-2.5 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 text-white transition-all">
                                <option value="1">預設測試帳號 (@my_threads)</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-2">貼文內容</label>
                            <textarea id="content" rows="5" required
                                class="w-full rounded-lg border border-slate-700 bg-slate-900 px-4 py-3 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 text-white resize-none transition-all placeholder-slate-600"
                                placeholder="今天想分享什麼酷東西？"></textarea>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-400 mb-2">排程日期</label>
                                <input type="date" id="scheduleDate" required
                                    class="w-full rounded-lg border border-slate-700 bg-slate-900 px-4 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 text-white css-color-scheme-dark">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-400 mb-2">排程時間</label>
                                <input type="time" id="scheduleTime" required
                                    class="w-full rounded-lg border border-slate-700 bg-slate-900 px-4 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 text-white css-color-scheme-dark">
                            </div>
                        </div>

                        <div class="flex justify-end pt-6 border-t border-slate-800 mt-6">
                            <button type="submit" id="submitBtn" class="flex items-center gap-2 rounded-lg bg-indigo-600 px-6 py-2.5 text-sm font-medium text-white hover:bg-indigo-700 transition-colors shadow-lg shadow-indigo-500/25 focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:ring-offset-slate-950">
                                <i class="fa-solid fa-paper-plane"></i> 儲存排程
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 設定預設時間為現在時間加 5 分鐘
        const now = new Date();
        now.setMinutes(now.getMinutes() + 5);
        
        document.getElementById('scheduleDate').value = now.toISOString().split('T')[0];
        document.getElementById('scheduleTime').value = now.toTimeString().slice(0,5);

        // 提交表單邏輯
        document.getElementById('postForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const alertBox = document.getElementById('statusAlert');
            const originalBtnText = btn.innerHTML;
            
            // 改變按鈕狀態
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 儲存中...';
            btn.disabled = true;
            btn.classList.add('opacity-75');

            const content = document.getElementById('content').value;
            const date = document.getElementById('scheduleDate').value;
            const time = document.getElementById('scheduleTime').value;
            const scheduledAt = `${date} ${time}:00`;

            try {
                // 呼叫我們在 bot.py 裡面寫好的 API
                const response = await fetch('/api/schedule', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content, scheduledAt })
                });

                const result = await response.json();

                alertBox.classList.remove('hidden', 'bg-red-500/10', 'text-red-400', 'border-red-500/20');
                alertBox.classList.add('bg-green-500/10', 'text-green-400', 'border', 'border-green-500/20');
                alertBox.innerHTML = '<i class="fa-solid fa-circle-check mr-2"></i> ' + result.message;
                
                // 清空輸入框
                document.getElementById('content').value = '';
                
            } catch (error) {
                alertBox.classList.remove('hidden', 'bg-green-500/10', 'text-green-400', 'border-green-500/20');
                alertBox.classList.add('bg-red-500/10', 'text-red-400', 'border', 'border-red-500/20');
                alertBox.innerHTML = '<i class="fa-solid fa-circle-exclamation mr-2"></i> 儲存失敗，請檢查連線。';
            } finally {
                // 恢復按鈕
                btn.innerHTML = originalBtnText;
                btn.disabled = false;
                btn.classList.remove('opacity-75');
            }
        });
    </script>
</body>
</html>
